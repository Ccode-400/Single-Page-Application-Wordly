<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wordly Dictionary</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>

<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow p-4">

    <h2 class="text-center mb-4">📖 Wordly Dictionary</h2>
    <p class="mb-0">Search words, learn faster, grow smarter</p>

    <!-- Search Form -->
    <form id="searchForm" class="d-flex mb-3">
      <input type="text" id="wordInput" class="form-control me-2" placeholder="Enter a word..." required>
      <button class="btn btn-primary">Search</button>
    </form>
    
    <!-- Error Message -->
    <div id="error" class="text-danger mb-3"></div>

    <!-- Results -->
    <div id="result"></div>

  </div>
</div>

<script src="index.js"></script>
</body>
</html>
