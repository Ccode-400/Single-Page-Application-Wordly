<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wordly Dictionary</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<style>
  body {
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
  }

  .card {
    border-radius: 15px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
  }

  h2 {
    font-weight: bold;
    color: #333;
  }

  /* Input styling */
  #wordInput {
    border-radius: 10px;
    transition: all 0.3s ease;
  }

  #wordInput:focus {
    border-color: #764ba2;
    box-shadow: 0 0 10px rgba(118,75,162,0.4);
  }

  /* Button styling */
  .btn-primary {
    border-radius: 10px;
    transition: all 0.3s ease;
  }

  .btn-primary:hover {
    background-color: #5a3ea1;
    transform: scale(1.05);
  }

  /* Result animation */
  #result {
    animation: fadeIn 0.5s ease-in-out;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Word display card */
  .result-card {
    background: #ffffff;
    border-radius: 12px;
    padding: 20px;
    margin-top: 15px;
    transition: 0.3s;
  }

  .result-card:hover {
    background: #f8f9fa;
  }

  /* Highlight text */
  .result-card h3 {
    color: #764ba2;
    font-weight: bold;
  }

  /* Error styling */
  #error {
    font-weight: 500;
  }

  /* Audio styling */
  audio {
    margin-top: 10px;
    width: 100%;
  }
</style>

<div class="container mt-5">
  <div class="card shadow p-4">

    <h2 class="text-center mb-4">📖 Wordly Dictionary</h2>

    <!-- Search Form -->
    <form id="searchForm" class="d-flex mb-3">
      <input type="text" id="wordInput" class="form-control me-2" placeholder="Enter a word..." required>
      <button class="btn btn-primary">Search</button>
    </form>
    
    <!-- Error Message -->
    <div id="error" class="text-danger mb-3"></div>

    <!-- Results -->
    <div id="result"></div>

  </div>
</div>

<script src="index.js"></script>
</body>
</html>
